services:
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
      - SECRET_KEY=supersecretkey
    depends_on:
      - mongo
    expose:
      - "5000"

  transactions:
    build:
      context: ./transactions
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
      - PORT=3000
    depends_on:
      - mongo
    expose:
      - "3000"

  studentportfolio:
    build:
      context: ./studentportfolio
      dockerfile: Dockerfile
    depends_on:
      - backend
      - transactions
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - studentportfolio
      - backend
      - transactions

volumes:
  mongo_data: